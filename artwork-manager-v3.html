<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap');

  :root {
    --bg: #f9f6f1;
    --surface: #fdfcf9;
    --surface2: #f2ede6;
    --ink: #1c1a18;
    --ink2: #5c5650;
    --ink3: #aea89f;
    --accent: #3a5a8c;
    --accent2: #2d4870;
    --red: #9b4a4a;
    --green: #3d6b52;
    --orange: #9b6630;
    --border: #e2dbd2;
    --shadow: rgba(60,50,30,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; font-size: 13px;
    font-weight: 300; letter-spacing: 0.03em;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center;
    height: 52px; position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem; font-weight: 400;
    color: var(--ink); letter-spacing: 0.2em;
  }

  main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem; }

  /* ファイルバー */
  .file-bar {
    display: flex; gap: 0.5rem; margin-bottom: 1.2rem;
    align-items: center; flex-wrap: wrap;
    padding-bottom: 1rem; border-bottom: 1px solid var(--border);
  }
  .file-status { font-size: 0.72rem; color: var(--ink3); margin-left: auto; letter-spacing: 0.05em; }

  /* ボタン */
  .btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem; font-weight: 400;
    padding: 0.45rem 1rem;
    border: 1px solid var(--border);
    background: transparent; color: var(--ink2);
    cursor: pointer; letter-spacing: 0.08em;
    transition: all 0.2s; border-radius: 2px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--ink2); color: var(--ink); background: var(--surface2); }
  .btn-primary {
    background: var(--accent); color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-sm { padding: 0.32rem 0.75rem; font-size: 0.72rem; }

  /* フィルター */
  .filter-bar {
    display: flex; gap: 0.6rem; margin-bottom: 1rem;
    flex-wrap: wrap; align-items: center;
  }
  .filter-bar select, .filter-bar input[type="text"] {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem; font-weight: 300;
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--ink);
    border-radius: 2px; outline: none;
    letter-spacing: 0.05em;
  }
  .filter-bar select:focus, .filter-bar input:focus {
    border-color: var(--accent);
  }
  .filter-bar input[type="text"] { min-width: 200px; flex: 1; }
  .filter-label { font-size: 0.72rem; color: var(--ink3); white-space: nowrap; letter-spacing: 0.08em; }

  /* チェックボックスフィルター */
  .checkbox-filter {
    display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap;
    margin-bottom: 0.8rem; padding: 0.6rem 1rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
  }
  .cb-label {
    display: flex; align-items: center; gap: 0.35rem;
    cursor: pointer; font-size: 0.75rem; color: var(--ink2);
    letter-spacing: 0.05em;
  }
  .cb-label input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); width: 13px; height: 13px; }

  /* インラインフォーム */
  .inline-form {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 2px; margin-bottom: 1.5rem;
  }
  .inline-form-title {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.8rem 1.2rem; cursor: pointer;
    font-size: 0.78rem; font-weight: 400;
    color: var(--ink2); letter-spacing: 0.12em;
    user-select: none; background: var(--surface2);
  }
  .inline-form-title:hover { background: #ebe5dc; }
  .inline-form-body { padding: 1.2rem; border-top: 1px solid var(--border); }
  .inline-form-footer { display: flex; justify-content: flex-end; gap: 0.6rem; padding-top: 1rem; border-top: 1px solid var(--border); margin-top: 0.8rem; }

  /* セクション */
  .section { margin-bottom: 2rem; }
  .section-header { display: flex; align-items: baseline; gap: 0.8rem; margin-bottom: 0.8rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
  .section-title { font-family: 'Noto Serif JP', serif; font-size: 0.82rem; font-weight: 400; color: var(--ink); letter-spacing: 0.15em; }
  .section-count { font-size: 0.68rem; color: var(--ink3); letter-spacing: 0.08em; }

  /* テーブル */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  thead { }
  th {
    padding: 0.6rem 0.9rem; text-align: left; font-weight: 400;
    font-size: 0.7rem; white-space: nowrap; color: var(--ink3);
    cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.1em; background: var(--surface2);
  }
  th:hover { color: var(--accent); }
  td { padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--ink); font-weight: 300; }
  tr:last-child td { border-bottom: none; }


  /* バッジ */
  .badge {
    display: inline-block; padding: 0.1rem 0.6rem;
    border-radius: 1px; font-size: 0.67rem;
    letter-spacing: 0.08em; white-space: nowrap;
    font-weight: 400;
  }
  .badge-予定 { background: #e8eef6; color: #3a5a8c; border: 1px solid #c5d3e8; }
  .badge-渡し中 { background: #f6ede8; color: #9b6630; border: 1px solid #e8d0bb; }
  .badge-返却中 { background: #f6e8e8; color: #9b4a4a; border: 1px solid #e8c5c5; }
  .badge-完了 { background: #e8f2ec; color: #3d6b52; border: 1px solid #bddece; }
  .badge-なし { background: var(--surface2); color: var(--ink3); border: 1px solid var(--border); }

  .actions { display: flex; gap: 0.3rem; }
  .empty { text-align: center; padding: 3rem; color: var(--ink3); font-size: 0.78rem; letter-spacing: 0.1em; }
  .row-sub td { border-bottom: 1px solid var(--border) !important; }
  .sub-info { font-size: 0.7rem; color: var(--ink3); letter-spacing: 0.05em; }
  .sub-dates { font-size: 0.68rem; color: var(--ink3); margin-left: 0.5rem; }
  .row-main td { border-bottom: none !important; }
  .row-main td[rowspan] { border-bottom: 1px solid var(--border) !important; }


  /* フォーム段組み */
  .form-rows { display: flex; flex-direction: column; gap: 0.7rem; }
  .form-row { display: flex; gap: 0.7rem; align-items: flex-end; flex-wrap: wrap; }
  .form-row .form-group { min-width: 120px; }
  .form-grow { flex: 1; }

  /* フォームグリッド（旧）*/
  .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group.span2 { grid-column: span 2; }
  label { font-size: 0.68rem; color: var(--ink3); letter-spacing: 0.1em; }
  input[type="text"], input[type="date"], input[type="number"], textarea, select.form-select {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem; font-weight: 300;
    padding: 0.45rem 0.7rem;
    border: 1px solid var(--border);
    background: #fff; color: var(--ink);
    border-radius: 2px; outline: none;
    transition: border-color 0.2s; width: 100%;
    letter-spacing: 0.03em;
  }
  input:focus, textarea:focus, select.form-select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 55px; }

  /* トースト */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--ink); color: #fdfcf9;
    padding: 0.7rem 1.2rem; border-radius: 2px; font-size: 0.75rem;
    z-index: 300; transform: translateY(60px); opacity: 0;
    transition: all 0.25s ease; letter-spacing: 0.08em;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); max-width: 240px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group.span2 { grid-column: 1 / -1; }
    header { padding: 0 1rem; }
    main { padding: 1rem; }
    .hide-sp { display: none; }
    th, td { padding: 0.5rem 0.6rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">作品管理システム</div>
</header>

<main>
  <!-- ファイル操作 -->
  <div class="file-bar">
    <span class="file-bar-label">データ</span>
    <button class="btn btn-sm" onclick="loadFile()">📂 読み込む</button>
    <button class="btn btn-sm btn-primary" onclick="saveFile()">💾 保存する</button>
    <button class="btn btn-sm" onclick="exportCSV()">📊 CSV書き出し</button>
    <button class="btn btn-sm" onclick="document.getElementById('importInput').click()">📥 インポート</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileLoad(event)">
    <input type="file" id="importInput" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleImport(event)">
    <span class="file-status" id="fileStatus">— 未読み込み</span>
  </div>

  <!-- 常時表示の入力フォーム -->
  <div class="inline-form" id="inlineForm">
    <div class="inline-form-title" onclick="toggleForm()">
      <span>＋ 新規登録</span>
      <span id="formToggleIcon">▲</span>
    </div>
    <div class="inline-form-body" id="inlineFormBody">
      <div class="form-rows">
        <!-- 1段目：区分・業者名 -->
        <div class="form-row">
          <div class="form-group">
            <label>区分</label>
            <select class="form-select" id="f-category">
              <option value="予定">予定</option>
              <option value="渡し中">渡し中</option>
              <option value="返却中">返却中</option>
              <option value="完了">完了</option>
              <option value="なし">なし</option>
            </select>
          </div>
          <div class="form-group form-grow">
            <label>業者名</label>
            <div style="display:flex; gap:0.4rem;">
              <select class="form-select" id="f-vendor-select" onchange="onVendorSelect(this.value)" style="width:180px; flex-shrink:0;">
                <option value="">-- 選択 --</option>
              </select>
              <input type="text" id="f-vendor" placeholder="または直接入力" style="flex:1;">
            </div>
          </div>
        </div>
        <!-- 2段目：作家名・作品名 -->
        <div class="form-row">
          <div class="form-group" style="flex:1;">
            <label>作家名</label>
            <input type="text" id="f-artist" placeholder="">
          </div>
          <div class="form-group" style="flex:2;">
            <label>作品名</label>
            <input type="text" id="f-artwork" placeholder="">
          </div>
        </div>
        <!-- 3段目：渡し日・返却日・費用 -->
        <div class="form-row">
          <div class="form-group">
            <label>渡し日</label>
            <input type="date" id="f-sentDate">
          </div>
          <div class="form-group">
            <label>返却日</label>
            <input type="date" id="f-returnDate">
          </div>
          <div class="form-group">
            <label>費用（円）</label>
            <input type="number" id="f-cost" placeholder="0" min="0">
          </div>
        </div>
        <!-- 4段目：備考 -->
        <div class="form-row">
          <div class="form-group" style="flex:1;">
            <label>備考</label>
            <textarea id="f-memo" placeholder=""></textarea>
          </div>
        </div>
      </div>
      <div class="inline-form-footer">
        <button class="btn" onclick="clearForm()">クリア</button>
        <button class="btn btn-primary" onclick="saveRecord()">保存する</button>
      </div>
    </div>
  </div>

  <!-- フィルター -->
  <div class="filter-bar">
    <span class="filter-label">絞り込み：</span>
    <select id="filterVendor" onchange="renderAll()">
      <option value="">業者：すべて</option>
    </select>
    <input type="text" id="searchInput" placeholder="作家名・作品名・備考で検索..." oninput="renderAll()">
    <button class="btn btn-sm" onclick="resetView()">表示リセット</button>
  </div>

  <!-- テーブル①：予定・返却中・完了・なし -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">予定 / 返却中 / 完了 / なし</span>
      <span class="section-count" id="count1">0件</span>
    </div>
    <div class="checkbox-filter">
      <span class="filter-label">表示する区分：</span>
      <label class="cb-label"><input type="checkbox" value="予定" checked onchange="renderAll()"> <span class="badge badge-予定">予定</span></label>
      <label class="cb-label"><input type="checkbox" value="返却中" checked onchange="renderAll()"> <span class="badge badge-返却中">返却中</span></label>
      <label class="cb-label"><input type="checkbox" value="完了" onchange="renderAll()"> <span class="badge badge-完了">完了</span></label>
      <label class="cb-label"><input type="checkbox" value="なし" onchange="renderAll()"> <span class="badge badge-なし">なし</span></label>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable(1,'category')" style="width:65px">区分 ↕</th>
            <th onclick="sortTable(1,'vendor')" style="width:130px">業者名 ↕</th>
            <th onclick="sortTable(1,'artist')">作家名 ↕</th>
            <th onclick="sortTable(1,'artwork')">作品名 ↕</th>
            <th onclick="sortTable(1,'sentDate')">渡し日 ↕</th>
            <th onclick="sortTable(1,'returnDate')">返却日 ↕</th>
            <th onclick="sortTable(1,'cost')">費用 ↕</th>
            <th style="width:80px"></th>
          </tr>
        </thead>
        <tbody id="tbody1"></tbody>
      </table>
    </div>
  </div>

  <!-- テーブル②：渡し中 -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">渡し中</span>
      <span class="section-count" id="count2">0件</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable(2,'category')" style="width:65px">区分 ↕</th>
            <th onclick="sortTable(2,'vendor')" style="width:130px">業者名 ↕</th>
            <th onclick="sortTable(2,'artist')">作家名 ↕</th>
            <th onclick="sortTable(2,'artwork')">作品名 ↕</th>
            <th onclick="sortTable(2,'sentDate')">渡し日 ↕</th>
            <th onclick="sortTable(2,'returnDate')">返却日 ↕</th>
            <th onclick="sortTable(2,'cost')">費用 ↕</th>
            <th style="width:80px"></th>
          </tr>
        </thead>
        <tbody id="tbody2"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let records = [];
let editId = null;
let sortKey1 = 'vendor', sortDir1 = 1;
let sortKey2 = 'vendor', sortDir2 = 1;

function resetView() {
  document.getElementById('filterVendor').value = '';
  document.getElementById('searchInput').value = '';
  // チェックボックスを予定・返却中のみに戻す
  document.querySelectorAll('.checkbox-filter input[type="checkbox"]').forEach(cb => {
    cb.checked = (cb.value === '予定' || cb.value === '返却中');
  });
  sortKey1 = 'vendor'; sortDir1 = 1;
  sortKey2 = 'vendor'; sortDir2 = 1;
  renderAll();
  showToast('表示をリセットしました');
}

function hoverPair(tr, on) {
  const color = on ? '#f5f0e8' : '';
  const next = tr.nextElementSibling;
  const prev = tr.previousElementSibling;
  // 自分の全tdに色
  [...tr.querySelectorAll('td')].forEach(td => td.style.backgroundColor = color);
  // ペアの行にも色
  if (tr.classList.contains('row-main') && next?.classList.contains('row-sub')) {
    [...next.querySelectorAll('td')].forEach(td => td.style.backgroundColor = color);
  } else if (tr.classList.contains('row-sub') && prev?.classList.contains('row-main')) {
    [...prev.querySelectorAll('td')].forEach(td => td.style.backgroundColor = color);
  }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().slice(0,10); }

function fmt(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}
function fmtCost(n) { return (n !== '' && n !== null && n !== undefined && n !== 0) ? '¥'+Number(n).toLocaleString() : '—'; }

// 業者一覧を更新
function updateVendorList() {
  const vendors = [...new Set(records.map(r => r.vendor).filter(Boolean))].sort();

  // セレクトボックス更新
  const sel = document.getElementById('f-vendor-select');
  const curSel = sel?.value;
  if (sel) {
    sel.innerHTML = '<option value="">-- 選択 --</option>' + vendors.map(v => `<option value="${v}">${v}</option>`).join('');
    if (curSel) sel.value = curSel;
  }

  // フィルター用セレクト更新
  const filterSel = document.getElementById('filterVendor');
  const cur = filterSel.value;
  filterSel.innerHTML = '<option value="">業者：すべて</option>' + vendors.map(v => `<option value="${v}">${v}</option>`).join('');
  if (cur) filterSel.value = cur;
}

function onVendorSelect(val) {
  if (val) document.getElementById('f-vendor').value = val;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fv = document.getElementById('filterVendor').value;

  return records.filter(r => {
    const searchMatch = !q || [r.artist, r.artwork, r.memo].join(' ').toLowerCase().includes(q);
    const vendorMatch = !fv || r.vendor === fv;
    return searchMatch && vendorMatch;
  });
}

function getCheckedCategories() {
  return [...document.querySelectorAll('.checkbox-filter input[type="checkbox"]:checked')]
    .map(cb => cb.value);
}

function sortRecords(arr, key, dir) {
  return [...arr].sort((a, b) => {
    let av = a[key] || '', bv = b[key] || '';
    if (key === 'cost') { av = Number(av); bv = Number(bv); }
    return av < bv ? -dir : av > bv ? dir : 0;
  });
}

function renderTable(tbodyId, records, sortKey, sortDir, countId) {
  const sorted = sortRecords(records, sortKey, sortDir);
  document.getElementById(countId).textContent = sorted.length + '件';

  const tbody = document.getElementById(tbodyId);
  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty">データがありません</div></td></tr>`;
    return;
  }

  tbody.innerHTML = sorted.map(r => `
  <tr class="row-main" ondblclick="openModal('${r.id}')" style="cursor:pointer" onmouseenter="hoverPair(this,true)" onmouseleave="hoverPair(this,false)">
    <td rowspan="2" style="vertical-align:middle; border-right:1px solid var(--border);">
      <span class="badge badge-${r.category||'なし'}">${r.category||'なし'}</span>
    </td>
    <td rowspan="2" style="vertical-align:middle; border-right:1px solid var(--border); font-weight:500;">
      ${r.vendor||'—'}
    </td>
    <td style="padding-bottom:0.15rem;">${r.artist||'—'}</td>
    <td style="padding-bottom:0.15rem; white-space:normal;">${r.artwork||'—'}</td>
    <td style="padding-bottom:0.15rem; white-space:nowrap;">${fmt(r.sentDate)}</td>
    <td style="padding-bottom:0.15rem; white-space:nowrap;">${fmt(r.returnDate)}</td>
    <td style="padding-bottom:0.15rem; white-space:nowrap;">${fmtCost(r.cost)}</td>
    <td rowspan="2" style="vertical-align:middle; width:80px;">
      <div class="actions">
        <button class="btn btn-sm" onclick="openModal('${r.id}')">編集</button>
        <button class="btn btn-sm" onclick="deleteRecord('${r.id}')" style="color:var(--red)">削除</button>
      </div>
    </td>
  </tr>
  <tr class="row-sub" ondblclick="openModal('${r.id}')" style="cursor:pointer" onmouseenter="hoverPair(this,true)" onmouseleave="hoverPair(this,false)">
    <td colspan="5" style="padding-top:0.15rem; color:var(--ink3); font-size:0.7rem; white-space:normal;">
      ${r.memo || '&nbsp;'}
    </td>
  </tr>`).join('');
}

function renderAll() {
  const filtered = getFiltered();
  const checked = getCheckedCategories();

  const group1 = filtered.filter(r => {
    const cat = r.category || 'なし';
    return ['予定','返却中','完了','なし'].includes(cat) && checked.includes(cat);
  });
  const group2 = filtered.filter(r => r.category === '渡し中');

  renderTable('tbody1', group1, sortKey1, sortDir1, 'count1');
  renderTable('tbody2', group2, sortKey2, sortDir2, 'count2');
  updateVendorList();
}

function sortTable(tableNum, key) {
  if (tableNum === 1) {
    if (sortKey1 === key) sortDir1 *= -1; else { sortKey1 = key; sortDir1 = 1; }
  } else {
    if (sortKey2 === key) sortDir2 *= -1; else { sortKey2 = key; sortDir2 = 1; }
  }
  renderAll();
}

// モーダル
// フォーム開閉
function toggleForm() {
  const body = document.getElementById('inlineFormBody');
  const icon = document.getElementById('formToggleIcon');
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? '' : 'none';
  icon.textContent = isHidden ? '▲' : '▼';
}

function openModal(id = null) {
  editId = id;
  const r = id ? records.find(x => x.id === id) : null;
  const vendorVal = r?.vendor || '';
  document.getElementById('f-vendor-select').value = vendorVal;
  document.getElementById('f-vendor').value = vendorVal;
  document.getElementById('f-artist').value = r?.artist || '';
  document.getElementById('f-artwork').value = r?.artwork || '';
  document.getElementById('f-category').value = r?.category || '予定';
  document.getElementById('f-sentDate').value = r?.sentDate || '';
  document.getElementById('f-returnDate').value = r?.returnDate || '';
  document.getElementById('f-cost').value = r?.cost ?? '';
  document.getElementById('f-memo').value = r?.memo || '';
  document.getElementById('inlineFormBody').style.display = '';
  document.getElementById('formToggleIcon').textContent = '▲';
  document.getElementById('inlineForm').scrollIntoView({ behavior: 'smooth' });
}

function clearForm() {
  editId = null;
  document.getElementById('f-vendor-select').value = '';
  document.getElementById('f-vendor').value = '';
  document.getElementById('f-artist').value = '';
  document.getElementById('f-artwork').value = '';
  document.getElementById('f-category').value = '予定';
  document.getElementById('f-sentDate').value = '';
  document.getElementById('f-returnDate').value = '';
  document.getElementById('f-cost').value = '';
  document.getElementById('f-memo').value = '';
}

function saveRecord() {
  const vendor = document.getElementById('f-vendor').value.trim();
  if (!vendor) { showToast('業者名を入力してください'); return; }

  const rec = {
    id: editId || uid(),
    vendor,
    artist: document.getElementById('f-artist').value.trim(),
    artwork: document.getElementById('f-artwork').value.trim(),
    category: document.getElementById('f-category').value,
    sentDate: document.getElementById('f-sentDate').value,
    returnDate: document.getElementById('f-returnDate').value,
    cost: document.getElementById('f-cost').value,
    memo: document.getElementById('f-memo').value.trim(),
  };

  if (editId) { const i = records.findIndex(r => r.id === editId); records[i] = rec; }
  else records.unshift(rec);

  clearForm(); renderAll();
  showToast(editId ? '更新しました' : '登録しました');
}

function deleteRecord(id) {
  if (!confirm('削除しますか？')) return;
  records = records.filter(r => r.id !== id);
  renderAll(); showToast('削除しました');
}

// ファイル操作
function saveFile() {
  const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `artwork-data-${today()}.json`;
  a.click();
  showToast('保存しました');
}

function loadFile() { document.getElementById('fileInput').click(); }

function handleFileLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      records = JSON.parse(ev.target.result);
      // 古いデータのstatusをcategoryに変換
      records = records.map(r => {
        if (!r.category && r.status) {
          const map = { 'out': '渡し中', 'returned': '完了' };
          r.category = map[r.status] || 'なし';
        }
        if (!r.category) r.category = 'なし';
        return r;
      });
      document.getElementById('fileStatus').textContent = `✓ ${file.name}`;
      renderAll(); showToast(`${records.length}件を読み込みました`);
    } catch { showToast('読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportCSV() {
  const header = ['業者名','作家名','作品名','区分','渡し日','返却日','費用(円)','備考'];
  const rows = records.map(r => [
    r.vendor, r.artist, r.artwork, r.category, r.sentDate, r.returnDate, r.cost, r.memo
  ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`));
  const csv = '\uFEFF' + [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `artwork-export-${today()}.csv`;
  a.click(); showToast('CSVを書き出しました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// インポート処理
async function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();

  try {
    let rows = [];

    if (ext === 'csv') {
      const text = await file.text();
      const lines = text.replace(/^\uFEFF/, '').split('\n').filter(l => l.trim());
      const header = parseCSVLine(lines[0]);
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        const obj = {};
        header.forEach((h, idx) => obj[h.trim()] = (vals[idx] || '').trim());
        rows.push(obj);
      }
    } else {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    }

    // カラム名マッピング（日本語・英語両対応）
    const colMap = {
      '業者名': 'vendor', 'vendor': 'vendor',
      '作家名': 'artist', 'artist': 'artist',
      '作品名': 'artwork', 'artwork': 'artwork',
      '区分': 'category', 'category': 'category',
      '渡し日': 'sentDate', 'sentDate': 'sentDate', '渡し日（sent）': 'sentDate',
      '返却日': 'returnDate', 'returnDate': 'returnDate',
      '費用': 'cost', '費用(円)': 'cost', 'cost': 'cost',
      '備考': 'memo', 'memo': 'memo',
    };

    const imported = rows.map(row => {
      const rec = { id: uid(), category: 'なし' };
      Object.entries(row).forEach(([k, v]) => {
        const mapped = colMap[k.trim()];
        if (mapped) rec[mapped] = formatImportValue(mapped, v);
      });
      return rec;
    }).filter(r => r.artwork || r.vendor);

    if (!imported.length) { showToast('取り込めるデータがありませんでした'); return; }

    // 確認ダイアログ
    const mode = confirm(
      `${imported.length}件のデータを読み込みます。\n\nOK → 既存データに追加\nキャンセル → 既存データを置き換え`
    );
    if (mode) {
      records = [...records, ...imported];
    } else {
      if (!confirm('既存のデータをすべて置き換えますか？')) return;
      records = imported;
    }

    renderAll();
    showToast(`${imported.length}件をインポートしました`);
  } catch(err) {
    showToast('インポートに失敗しました：' + err.message);
  }
  e.target.value = '';
}

function formatImportValue(key, val) {
  if (val === null || val === undefined) return '';
  if (key === 'sentDate' || key === 'returnDate') {
    if (val instanceof Date) {
      return val.toISOString().slice(0, 10);
    }
    const s = String(val).trim();
    // YYYY/MM/DD → YYYY-MM-DD
    return s.replace(/(\d{4})\/(\d{1,2})\/(\d{1,2})/, (_, y, m, d) =>
      `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
  }
  if (key === 'cost') return String(val).replace(/[¥,￥\s]/g, '') || '';
  if (key === 'category') {
    const cats = ['予定','渡し中','返却中','完了','なし'];
    return cats.includes(String(val).trim()) ? String(val).trim() : 'なし';
  }
  return String(val).trim();
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else cur += c;
  }
  result.push(cur);
  return result;
}

renderAll();
