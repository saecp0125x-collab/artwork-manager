<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #fffefb;
    --surface2: #f0ece4;
    --ink: #1a1612;
    --ink2: #5a5248;
    --ink3: #9a9088;
    --accent: #8b4513;
    --accent2: #c8793a;
    --red: #c0392b;
    --green: #2e7d52;
    --blue: #1a5f7a;
    --purple: #6b3fa0;
    --warn: #d4820a;
    --border: #d8d0c4;
    --shadow: rgba(26,22,18,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; }

  header {
    background: var(--ink); color: var(--bg);
    padding: 0 1.5rem; display: flex; align-items: center;
    justify-content: space-between; height: 56px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .logo { font-family: 'Shippori Mincho', serif; font-size: 1.05rem; letter-spacing: 0.15em; display: flex; align-items: center; gap: 0.7rem; }
  .logo-mark { width: 28px; height: 28px; border: 2px solid var(--accent2); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
  .header-right { display: flex; gap: 0.6rem; align-items: center; }

  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* ファイル操作 */
  .file-bar {
    display: flex; gap: 0.6rem; margin-bottom: 1.2rem;
    padding: 0.7rem 1rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 4px;
    align-items: center; flex-wrap: wrap;
  }
  .file-bar-label { font-size: 0.68rem; color: var(--ink3); letter-spacing: 0.08em; margin-right: 0.3rem; }
  .file-status { font-size: 0.72rem; color: var(--ink2); margin-left: auto; }

  .btn {
    font-family: 'DM Mono', monospace; font-size: 0.76rem;
    padding: 0.5rem 1rem; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--ink); cursor: pointer;
    letter-spacing: 0.04em; transition: all 0.15s; border-radius: 3px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-sm { padding: 0.28rem 0.6rem; font-size: 0.7rem; }

  /* フィルターバー */
  .filter-bar {
    display: flex; gap: 0.6rem; margin-bottom: 1rem;
    flex-wrap: wrap; align-items: center;
  }
  .filter-bar select, .filter-bar input[type="text"] {
    font-family: 'DM Mono', monospace; font-size: 0.76rem;
    padding: 0.48rem 0.8rem; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--ink); border-radius: 3px;
    outline: none; cursor: pointer;
  }
  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }
  .filter-bar input[type="text"] { min-width: 180px; flex: 1; }
  .filter-label { font-size: 0.7rem; color: var(--ink3); white-space: nowrap; }

  .checkbox-filter {
    display: flex; gap: 0.8rem; align-items: center;
    flex-wrap: wrap; margin-bottom: 0.7rem;
    padding: 0.6rem 0.8rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 4px;
  }
  .cb-label {
    display: flex; align-items: center; gap: 0.4rem;
    cursor: pointer; font-size: 0.78rem;
  }
  .cb-label input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); width: 15px; height: 15px; }

  /* セクション */
  .section { margin-bottom: 2rem; }
  .section-header {
    display: flex; align-items: center; gap: 0.8rem;
    margin-bottom: 0.7rem; padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--border);
  }
  .section-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.95rem; letter-spacing: 0.1em; color: var(--ink);
  }
  .section-count {
    font-size: 0.7rem; color: var(--ink3);
    background: var(--surface2); padding: 0.15rem 0.5rem;
    border-radius: 10px; border: 1px solid var(--border);
  }
  .section-badge {
    font-size: 0.68rem; padding: 0.15rem 0.5rem; border-radius: 2px;
  }

  /* テーブル */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow); overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead { background: var(--ink); color: var(--bg); }
  th {
    padding: 0.65rem 0.8rem; text-align: left; font-weight: 400;
    letter-spacing: 0.07em; font-size: 0.7rem; white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  th:hover { color: var(--accent2); }
  td { padding: 0.65rem 0.8rem; border-bottom: 1px solid var(--surface2); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdf9f5; }

  /* 区分バッジ */
  .badge { display: inline-block; padding: 0.18rem 0.5rem; border-radius: 2px; font-size: 0.68rem; white-space: nowrap; }
  .badge-予定 { background: #e8f0fe; color: var(--blue); border: 1px solid #b0c8f0; }
  .badge-渡し中 { background: #fef3e2; color: var(--warn); border: 1px solid #f5d08a; }
  .badge-返却中 { background: #fdecea; color: var(--red); border: 1px solid #f0b0aa; }
  .badge-完了 { background: #e8f5ee; color: var(--green); border: 1px solid #a8d5b8; }
  .badge-なし { background: var(--surface2); color: var(--ink3); border: 1px solid var(--border); }

  .actions { display: flex; gap: 0.3rem; }

  .empty { text-align: center; padding: 2.5rem; color: var(--ink3); font-size: 0.8rem; }

  /* モーダル */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,22,18,0.6);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 1rem; backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: translateY(10px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 1rem 1.3rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2); position: sticky; top: 0; z-index: 1;
  }
  .modal-title { font-family: 'Shippori Mincho', serif; font-size: 0.95rem; letter-spacing: 0.1em; }
  .modal-close { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--ink3); }
  .modal-close:hover { color: var(--ink); }
  .modal-body { padding: 1.3rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.7rem; color: var(--ink2); letter-spacing: 0.08em; }
  input[type="text"], input[type="date"], input[type="number"], textarea, select.form-select {
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    padding: 0.5rem 0.75rem; border: 1.5px solid var(--border);
    background: var(--bg); color: var(--ink); border-radius: 3px; outline: none;
    transition: border-color 0.15s; width: 100%;
  }
  input:focus, textarea:focus, select.form-select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }
  .modal-footer {
    padding: 0.9rem 1.3rem; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 0.7rem;
    position: sticky; bottom: 0; background: var(--surface);
  }

  /* datalist対応の業者入力 */
  .vendor-input { position: relative; }

  /* トースト */
  .toast {
    position: fixed; bottom: 1.2rem; right: 1.2rem;
    background: var(--ink); color: var(--bg);
    padding: 0.7rem 1rem; border-radius: 4px; font-size: 0.78rem;
    z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s;
    border-left: 3px solid var(--accent2); max-width: 280px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    header { padding: 0 0.8rem; }
    main { padding: 0.8rem; }
    .hide-sp { display: none; }
    th, td { padding: 0.55rem 0.5rem; font-size: 0.74rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">絵</div>
    作品管理
  </div>
  <div class="header-right">
    <button class="btn btn-primary" onclick="openModal()">＋ 新規登録</button>
  </div>
</header>

<main>
  <!-- ファイル操作 -->
  <div class="file-bar">
    <span class="file-bar-label">データ</span>
    <button class="btn btn-sm" onclick="loadFile()">📂 読み込む</button>
    <button class="btn btn-sm btn-primary" onclick="saveFile()">💾 保存する</button>
    <button class="btn btn-sm" onclick="exportCSV()">📊 CSV書き出し</button>
    <button class="btn btn-sm" onclick="document.getElementById('importInput').click()">📥 インポート</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileLoad(event)">
    <input type="file" id="importInput" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleImport(event)">
    <span class="file-status" id="fileStatus">— 未読み込み</span>
  </div>

  <!-- フィルター -->
  <div class="filter-bar">
    <span class="filter-label">絞り込み：</span>
    <select id="filterVendor" onchange="renderAll()">
      <option value="">業者：すべて</option>
    </select>
    <input type="text" id="searchInput" placeholder="作家名・作品名・備考で検索..." oninput="renderAll()">
  </div>

  <!-- テーブル①：予定・返却中・完了・なし -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">予定 / 返却中 / 完了 / なし</span>
      <span class="section-count" id="count1">0件</span>
    </div>
    <div class="checkbox-filter">
      <span class="filter-label">表示する区分：</span>
      <label class="cb-label"><input type="checkbox" value="予定" checked onchange="renderAll()"> <span class="badge badge-予定">予定</span></label>
      <label class="cb-label"><input type="checkbox" value="返却中" checked onchange="renderAll()"> <span class="badge badge-返却中">返却中</span></label>
      <label class="cb-label"><input type="checkbox" value="完了" onchange="renderAll()"> <span class="badge badge-完了">完了</span></label>
      <label class="cb-label"><input type="checkbox" value="なし" onchange="renderAll()"> <span class="badge badge-なし">なし</span></label>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>区分</th>
            <th onclick="sortTable(1,'vendor')">業者名 ↕</th>
            <th onclick="sortTable(1,'artist')">作家名 ↕</th>
            <th onclick="sortTable(1,'artwork')">作品名 ↕</th>
            <th onclick="sortTable(1,'sentDate')" class="hide-sp">渡した日 ↕</th>
            <th onclick="sortTable(1,'returnDate')" class="hide-sp">返却予定日 ↕</th>
            <th onclick="sortTable(1,'cost')" class="hide-sp">費用 ↕</th>
            <th>備考</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody1"></tbody>
      </table>
    </div>
  </div>

  <!-- テーブル②：渡し中 -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">渡し中</span>
      <span class="section-count" id="count2">0件</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>区分</th>
            <th onclick="sortTable(2,'vendor')">業者名 ↕</th>
            <th onclick="sortTable(2,'artist')">作家名 ↕</th>
            <th onclick="sortTable(2,'artwork')">作品名 ↕</th>
            <th onclick="sortTable(2,'sentDate')" class="hide-sp">渡した日 ↕</th>
            <th onclick="sortTable(2,'returnDate')" class="hide-sp">返却予定日 ↕</th>
            <th onclick="sortTable(2,'cost')" class="hide-sp">費用 ↕</th>
            <th>備考</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody2"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">新規登録</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>業者名 *</label>
          <input type="text" id="f-vendor" list="vendorList" placeholder="業者名を入力または選択">
          <datalist id="vendorList"></datalist>
        </div>
        <div class="form-group">
          <label>作家名</label>
          <input type="text" id="f-artist" placeholder="例：田中太郎">
        </div>
        <div class="form-group">
          <label>区分</label>
          <select class="form-select" id="f-category">
            <option value="予定">予定</option>
            <option value="渡し中">渡し中</option>
            <option value="返却中">返却中</option>
            <option value="完了">完了</option>
            <option value="なし">なし</option>
          </select>
        </div>
        <div class="form-group full">
          <label>作品名 *</label>
          <input type="text" id="f-artwork" placeholder="例：春の庭">
        </div>
        <div class="form-group">
          <label>渡した日</label>
          <input type="date" id="f-sentDate">
        </div>
        <div class="form-group">
          <label>返却予定日</label>
          <input type="date" id="f-returnDate">
        </div>
        <div class="form-group full">
          <label>かかった費用（円）</label>
          <input type="number" id="f-cost" placeholder="0" min="0">
        </div>
        <div class="form-group full">
          <label>備考</label>
          <textarea id="f-memo" placeholder="メモがあれば..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveRecord()">保存する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let records = [];
let editId = null;
let sortKey1 = 'vendor', sortDir1 = 1;
let sortKey2 = 'vendor', sortDir2 = 1;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().slice(0,10); }

function fmt(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}
function fmtCost(n) { return (n !== '' && n !== null && n !== undefined && n !== 0) ? '¥'+Number(n).toLocaleString() : '—'; }

// 業者一覧を更新
function updateVendorList() {
  const vendors = [...new Set(records.map(r => r.vendor).filter(Boolean))].sort();
  
  // datalist
  const dl = document.getElementById('vendorList');
  dl.innerHTML = vendors.map(v => `<option value="${v}">`).join('');

  // フィルター
  const sel = document.getElementById('filterVendor');
  const cur = sel.value;
  sel.innerHTML = '<option value="">業者：すべて</option>' + vendors.map(v => `<option value="${v}">${v}</option>`).join('');
  if (cur) sel.value = cur;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fv = document.getElementById('filterVendor').value;

  return records.filter(r => {
    const searchMatch = !q || [r.artist, r.artwork, r.memo].join(' ').toLowerCase().includes(q);
    const vendorMatch = !fv || r.vendor === fv;
    return searchMatch && vendorMatch;
  });
}

function getCheckedCategories() {
  return [...document.querySelectorAll('.checkbox-filter input[type="checkbox"]:checked')]
    .map(cb => cb.value);
}

function sortRecords(arr, key, dir) {
  return [...arr].sort((a, b) => {
    let av = a[key] || '', bv = b[key] || '';
    if (key === 'cost') { av = Number(av); bv = Number(bv); }
    return av < bv ? -dir : av > bv ? dir : 0;
  });
}

function renderTable(tbodyId, records, sortKey, sortDir, countId) {
  const sorted = sortRecords(records, sortKey, sortDir);
  document.getElementById(countId).textContent = sorted.length + '件';

  const tbody = document.getElementById(tbodyId);
  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty">データがありません</div></td></tr>`;
    return;
  }

  tbody.innerHTML = sorted.map(r => `<tr>
    <td><span class="badge badge-${r.category||'なし'}">${r.category||'なし'}</span></td>
    <td><strong>${r.vendor||'—'}</strong></td>
    <td>${r.artist||'—'}</td>
    <td>${r.artwork||'—'}</td>
    <td class="hide-sp">${fmt(r.sentDate)}</td>
    <td class="hide-sp">${fmt(r.returnDate)}</td>
    <td class="hide-sp">${fmtCost(r.cost)}</td>
    <td style="min-width:200px; white-space:normal; max-width:320px;">${r.memo||'—'}</td>
    <td><div class="actions">
      <button class="btn btn-sm" onclick="openModal('${r.id}')">編集</button>
      <button class="btn btn-sm" onclick="deleteRecord('${r.id}')" style="color:var(--red)">削除</button>
    </div></td>
  </tr>`).join('');
}

function renderAll() {
  const filtered = getFiltered();
  const checked = getCheckedCategories();

  const group1 = filtered.filter(r => {
    const cat = r.category || 'なし';
    return ['予定','返却中','完了','なし'].includes(cat) && checked.includes(cat);
  });
  const group2 = filtered.filter(r => r.category === '渡し中');

  renderTable('tbody1', group1, sortKey1, sortDir1, 'count1');
  renderTable('tbody2', group2, sortKey2, sortDir2, 'count2');
  updateVendorList();
}

function sortTable(tableNum, key) {
  if (tableNum === 1) {
    if (sortKey1 === key) sortDir1 *= -1; else { sortKey1 = key; sortDir1 = 1; }
  } else {
    if (sortKey2 === key) sortDir2 *= -1; else { sortKey2 = key; sortDir2 = 1; }
  }
  renderAll();
}

// モーダル
function openModal(id = null) {
  editId = id;
  const r = id ? records.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = id ? '編集' : '新規登録';
  document.getElementById('f-vendor').value = r?.vendor || '';
  document.getElementById('f-artist').value = r?.artist || '';
  document.getElementById('f-artwork').value = r?.artwork || '';
  document.getElementById('f-category').value = r?.category || '渡し中';
  document.getElementById('f-sentDate').value = r?.sentDate || today();
  document.getElementById('f-returnDate').value = r?.returnDate || '';
  document.getElementById('f-cost').value = r?.cost ?? '';
  document.getElementById('f-memo').value = r?.memo || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editId = null; }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function saveRecord() {
  const vendor = document.getElementById('f-vendor').value.trim();
  const artwork = document.getElementById('f-artwork').value.trim();
  if (!vendor || !artwork) { showToast('業者名と作品名は必須です'); return; }

  const rec = {
    id: editId || uid(),
    vendor,
    artist: document.getElementById('f-artist').value.trim(),
    artwork,
    category: document.getElementById('f-category').value,
    sentDate: document.getElementById('f-sentDate').value,
    returnDate: document.getElementById('f-returnDate').value,
    cost: document.getElementById('f-cost').value,
    memo: document.getElementById('f-memo').value.trim(),
  };

  if (editId) { const i = records.findIndex(r => r.id === editId); records[i] = rec; }
  else records.unshift(rec);

  closeModal(); renderAll();
  showToast(editId ? '更新しました' : '登録しました');
}

function deleteRecord(id) {
  if (!confirm('削除しますか？')) return;
  records = records.filter(r => r.id !== id);
  renderAll(); showToast('削除しました');
}

// ファイル操作
function saveFile() {
  const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `artwork-data-${today()}.json`;
  a.click();
  showToast('保存しました');
}

function loadFile() { document.getElementById('fileInput').click(); }

function handleFileLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      records = JSON.parse(ev.target.result);
      // 古いデータのstatusをcategoryに変換
      records = records.map(r => {
        if (!r.category && r.status) {
          const map = { 'out': '渡し中', 'returned': '完了' };
          r.category = map[r.status] || 'なし';
        }
        if (!r.category) r.category = 'なし';
        return r;
      });
      document.getElementById('fileStatus').textContent = `✓ ${file.name}`;
      renderAll(); showToast(`${records.length}件を読み込みました`);
    } catch { showToast('読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportCSV() {
  const header = ['業者名','作家名','作品名','区分','渡した日','返却予定日','費用(円)','備考'];
  const rows = records.map(r => [
    r.vendor, r.artist, r.artwork, r.category, r.sentDate, r.returnDate, r.cost, r.memo
  ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`));
  const csv = '\uFEFF' + [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `artwork-export-${today()}.csv`;
  a.click(); showToast('CSVを書き出しました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// インポート処理
async function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();

  try {
    let rows = [];

    if (ext === 'csv') {
      const text = await file.text();
      const lines = text.replace(/^\uFEFF/, '').split('\n').filter(l => l.trim());
      const header = parseCSVLine(lines[0]);
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        const obj = {};
        header.forEach((h, idx) => obj[h.trim()] = (vals[idx] || '').trim());
        rows.push(obj);
      }
    } else {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    }

    // カラム名マッピング（日本語・英語両対応）
    const colMap = {
      '業者名': 'vendor', 'vendor': 'vendor',
      '作家名': 'artist', 'artist': 'artist',
      '作品名': 'artwork', 'artwork': 'artwork',
      '区分': 'category', 'category': 'category',
      '渡した日': 'sentDate', 'sentDate': 'sentDate', '渡した日（sent）': 'sentDate',
      '返却予定日': 'returnDate', 'returnDate': 'returnDate',
      '費用': 'cost', '費用(円)': 'cost', 'cost': 'cost',
      '備考': 'memo', 'memo': 'memo',
    };

    const imported = rows.map(row => {
      const rec = { id: uid(), category: 'なし' };
      Object.entries(row).forEach(([k, v]) => {
        const mapped = colMap[k.trim()];
        if (mapped) rec[mapped] = formatImportValue(mapped, v);
      });
      return rec;
    }).filter(r => r.artwork || r.vendor);

    if (!imported.length) { showToast('取り込めるデータがありませんでした'); return; }

    // 確認ダイアログ
    const mode = confirm(
      `${imported.length}件のデータを読み込みます。\n\nOK → 既存データに追加\nキャンセル → 既存データを置き換え`
    );
    if (mode) {
      records = [...records, ...imported];
    } else {
      if (!confirm('既存のデータをすべて置き換えますか？')) return;
      records = imported;
    }

    renderAll();
    showToast(`${imported.length}件をインポートしました`);
  } catch(err) {
    showToast('インポートに失敗しました：' + err.message);
  }
  e.target.value = '';
}

function formatImportValue(key, val) {
  if (val === null || val === undefined) return '';
  if (key === 'sentDate' || key === 'returnDate') {
    if (val instanceof Date) {
      return val.toISOString().slice(0, 10);
    }
    const s = String(val).trim();
    // YYYY/MM/DD → YYYY-MM-DD
    return s.replace(/(\d{4})\/(\d{1,2})\/(\d{1,2})/, (_, y, m, d) =>
      `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
  }
  if (key === 'cost') return String(val).replace(/[¥,￥\s]/g, '') || '';
  if (key === 'category') {
    const cats = ['予定','渡し中','返却中','完了','なし'];
    return cats.includes(String(val).trim()) ? String(val).trim() : 'なし';
  }
  return String(val).trim();
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else cur += c;
  }
  result.push(cur);
  return result;
}

renderAll();
